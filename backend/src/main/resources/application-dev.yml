spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blog_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root          # 改成你本机 MySQL 的用户名
    password: 123456 # 改成你本机 MySQL 的密码
    driver-class-name: com.mysql.cj.jdbc.Driver

cors:
  allowed-origins: http://localhost:5173,http://localhost:4173

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    default-enum-type-handler: com.baomidou.mybatisplus.extension.handlers.MybatisEnumTypeHandler

logging:
  level:
    com.personalsite.blog: DEBUG
